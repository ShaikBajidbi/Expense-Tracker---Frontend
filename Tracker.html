<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/Tracker.css">
  </head>
  <body>
    <div class="header">
        <p class="m-0">Expense<br>Tracker</p>

    </div>
    <div class="input-form">
      <div class="form-floating">
         <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
         <label for="floatingInput">Amount</label>
      </div>
      <select class="form-select" aria-label="Default select example">
           <option selected>Transaction Type</option>
           <option value="Income">Income</option>
           <option value="Expense">Expense</option>
         </select>
       <div class="form-floating">
           <input type="date" class="form-control" id="floatingInput" placeholder="name@example.com">
           <label for="floatingInput">Date</label>
        </div>
          <button class="btn" id="add-button">+</button>
    </div>
    <div class = "cards mt-4">
      <div class="card" style="width: 18rem;">
  <div class="card-body">
    <h5 class="card-title m-0">Total Income</h5>
    <h1 class="m-0">
      <span id="totalIncome" class="m-0">10,499</span>

    </h1>
  </div>
</div>
<div class="card" style="width: 18rem;">
  <div class="card-body">
    <h5 class="card-title m-0">Total Expense</h5>
    <h1 class="m-0">
      <span id="TotalExpense" class="m-0">5,499</span>
    
  </div>
</div>
<div class="card" style="width: 18rem;">
  <div class="card-body">
    <h5 class="card-title m-0">Balance</h5>
    <h1 class="m-0">
      <span id="Balance" class="m-0">15,500</span>
    
  </div>
</div>
    </div>
    <table class="Transaction-table mt-3">
      <tr id="header-row">
        <th>Amount</th>
        <th>Transaction Type</th>
        <th>Transaction Date</th>
        <th>Action</th>
      </tr>
      <tr>
        <td>10,499</td>
        <td>Income</td>
        <td>04-10-2025</td>
        <td><button class="delete-btn">
         Delete
        </button>
      </td>
      </tr>
      <tr>
        <td>11,499</td>
        <td>Income</td>
        <td>04-05-2025</td>
        <td><button class="delete-btn">
         Delete
        </button>
      </td>
      </tr>
      <tr>
        <td>1,999</td>
        <td>Income</td>
        <td>30-04-2025</td>
        <td><button class="delete-btn">
         Delete
        </button>
      </td>
      </tr>
      <tr>
        <td>10,000</td>
        <td>Income</td>
        <td>10-03-2025</td>
        <td><button class="delete-btn">
         Delete
        </button>
      </td>
      </tr>
      <tr>
        <td>5,500</td>
        <td>Income</td>
        <td>30-01-2025</td>
        <td><button class="delete-btn">
         Delete
        </button>
      </td>
      </tr>

    </table>
  


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
     <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    </body>
</html>
